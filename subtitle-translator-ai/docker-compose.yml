services:
  backend:
    build: ./subtitle-translator-back
    container_name: subtranslator-backend
    ports:
      - "5001:5001"
    volumes:
      # MAPEAMOS LA RUTA DE LA NUC AL INTERIOR DEL CONTENEDOR
      - ${NAS_MOUNT_HOST:-/mnt/synology}:${NAS_MOUNT_CONTAINER:-/mnt/media}
    environment:
      # APUNTA A TU TORRE PARA USAR LA RTX 5060 Ti
      - OLLAMA_HOST=${OLLAMA_HOST}
    restart: unless-stopped

  frontend:
    build: ./subtitle-translator-front
    container_name: subtranslator-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    restart: unless-stopped
